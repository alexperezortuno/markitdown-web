services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    environment:
      APP_URL: "https://<URL>"
    ports:
      - "3000:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
