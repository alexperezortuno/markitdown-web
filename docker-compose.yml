services:
  markify:
    container_name: markify
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    ports:
      - "8085:8085"
    environment:
      - APP_URL=http://localhost
      - PORT=8085
      - GA_MEASUREMENT_ID=
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8085"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
